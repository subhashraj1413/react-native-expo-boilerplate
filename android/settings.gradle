pluginManagement {
  includeBuild("../node_modules/@react-native/gradle-plugin")

  def nodeBinary = [
    System.getenv("NODE_BINARY"),
    "/opt/homebrew/bin/node",
    "/usr/local/bin/node",
    "node",
  ].find { candidate ->
    candidate != null && !candidate.trim().isEmpty() &&
      (candidate == "node" || new File(candidate).exists())
  } ?: "node"

  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine(
        nodeBinary,
        "--print",
        "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })",
      )
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath

  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

def nodeBinary = [
  System.getenv("NODE_BINARY"),
  "/opt/homebrew/bin/node",
  "/usr/local/bin/node",
  "node",
].find { candidate ->
  candidate != null && !candidate.trim().isEmpty() &&
    (candidate == "node" || new File(candidate).exists())
} ?: "node"

def reactNativeConfigCommand = [
  nodeBinary,
  "--no-warnings",
  "--eval",
  "require('expo/bin/autolinking')",
  "expo-modules-autolinking",
  "react-native-config",
  "--platform",
  "android",
  "--json",
]

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  ex.autolinkLibrariesFromCommand(reactNativeConfigCommand)
}

rootProject.name = "ReactNativeExpoBoilerplate"
include(":app")
includeBuild("../node_modules/@react-native/gradle-plugin")
expoAutolinking.useExpoModules()
expoAutolinking.useExpoVersionCatalog()
includeBuild(expoAutolinking.reactNativeGradlePlugin)
